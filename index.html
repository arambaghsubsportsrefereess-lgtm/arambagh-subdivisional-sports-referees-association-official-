<!DOCTYPE html>  
<html lang="bn">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">  
    <meta http-equiv="X-UA-Compatible" content="ie=edge">  

    <!-- Google Site Verification -->
    <meta name="google-site-verification" content="mueCYTMqZ0NOgb0uKAxpE7NUxjXZwgYMecwkRfBixs4" />

    <title>ASSRA Official | Advanced 3D Portal</title>  
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700;900&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">  
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">  

    <style>  
        :root {  
            --c-teal: #00ACC1; --c-blue: #4285F4; --c-red: #EA4335; --c-green: #34A853; 
            --c-purple: #8E24AA; --c-gold: #FBBC05; --c-orange: #FB8C00;
            --bg-deep: #0f172a; --card-glass: rgba(255, 255, 255, 0.1);
        }  

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }  
        body { 
            background: #0f172a; color: #f8fafc; font-family: 'Poppins', 'Noto Sans Bengali', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            padding-bottom: 50px;
        }

        /* 3D Advanced Typography */
        h1, h2, h3 { 
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5), 0 0 10px rgba(255,255,255,0.1);
        }

        /* Hero Section */
        header { padding: 40px 20px; text-align: center; }
        .hero-banner { 
            width: 100%; max-width: 900px; border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(66, 133, 244, 0.3);
            border: 4px solid rgba(255,255,255,0.1);
            transform: perspective(1000px) rotateX(5deg);
        }

        .container { max-width: 1000px; margin: 40px auto; padding: 20px; display: grid; gap: 40px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }  

        /* Hyper Advanced 3D Cards */
        .card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 40px; 
            box-shadow: 20px 20px 60px #0a0f1c, -20px -20px 60px #141f38;
            transition: 0.5s ease;
        }
        .card:hover { transform: scale(1.05) translateZ(20px); border-color: var(--c-teal); }

        /* Modern 3D Buttons */
        .btn-3d { 
            padding: 20px; border-radius: 20px; border: none; font-weight: 800; color: white;
            cursor: pointer; transition: 0.3s; width: 100%; font-size: 1.1rem;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }
        .btn-3d:active { transform: translateY(5px); box-shadow: none; }

        /* Modal Overlays */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { 
            background: #1e293b; padding: 40px; border-radius: 40px; max-width: 500px; width: 100%; 
            border: 2px solid #334155; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Utilities */
        .g-color { background: linear-gradient(90deg, #4285F4, #EA4335, #FBBC05, #34A853); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>  
<body>  

    <header>
        <img src="file_0000000020b871fb9dfa54f75f7ddc0a.png" class="hero-banner">
        <h1 class="g-color" style="margin-top: 20px;">ASSRA Official Portal</h1>
    </header>

    <main class="container">
        <div class="card">
            <h2>সদস্যপদ আবেদন</h2>
            <a href="https://forms.gle/JZRYHVyoqFffUX7B8" class="btn-3d" style="background: var(--c-blue);">আবেদন করুন</a>
        </div>
        <div class="card">
            <h2>রেফারি তথ্য</h2>
            <button onclick="openModal('refereeModal')" class="btn-3d" style="background: var(--c-green);">নিরাপদ তালিকা</button>
        </div>
        <div class="card">
            <h2>হেল্প এন্ড সাপোর্ট</h2>
            <a href="https://wa.me/917063374492" class="btn-3d" style="background: #25D366; margin-bottom: 10px;">WhatsApp</a>
            <a href="mailto:arambaghsub.sports.refereess@gmail.com" class="btn-3d" style="background: var(--c-red);">Email</a>
        </div>
    </main>

    <!-- Modals -->
    <div id="welcomeModal" class="modal">
        <div class="modal-box">
            <h2 class="g-color">Welcome to ASSRA</h2>
            <p style="margin: 20px 0;">ওয়েবসাইটটি ভিজিট করার জন্য ধন্যবাদ। এই ভার্সনটি প্রিমিয়াম থ্রিডি মোডে লোড হচ্ছে।</p>
            <button id="closeWelcome" class="btn-3d" style="background: var(--c-teal);">প্রবেশ করুন</button>
        </div>
    </div>

    <script>
        // Modal Logic
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // Popup Cooldown (5 mins)
        window.onload = () => {
            const last = localStorage.getItem('lastClosed');
            if(!last || (Date.now() - last > 300000)) document.getElementById('welcomeModal').style.display = 'flex';
        };

        document.getElementById('closeWelcome').onclick = () => {
            document.getElementById('welcomeModal').style.display = 'none';
            localStorage.setItem('lastClosed', Date.now());
        };
    </script>
</body>
</html>
