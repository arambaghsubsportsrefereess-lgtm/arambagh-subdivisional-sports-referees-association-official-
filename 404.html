<!DOCTYPE html>
<html lang="bn" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - পৃষ্ঠাটি পাওয়া যায়নি | 🆕 🚧 ⚠️ Beta Version 12 Premium Upgrade</title>
    
    <!-- Enterprise SEO & Robots Meta -->
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#0f172a" id="meta-theme-color">
    <meta property="og:title" content="404 Error - Page Not Found">
    <meta property="og:description" content="দুঃখিত! আপনি যে পেজটি খুঁজছেন তা মুছে ফেলা হয়েছে অথবা লিংকটি ভুল।">
    <meta name="twitter:card" content="summary">

    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+Bengali:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        :root {
            --bg-base: #0f172a; --glass-surface: rgba(30, 41, 59, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --blob-primary: #38bdf8; --blob-secondary: #8b5cf6; --blob-tertiary: #10b981;
            --c-blue: #3b82f6; --c-cyan: #06b6d4; --c-purple: #8b5cf6;
        }

        [data-theme="light"] {
            --bg-base: #f8fafc; --glass-surface: rgba(255, 255, 255, 0.85); --glass-border: rgba(148, 163, 184, 0.2);
            --text-main: #0f172a; --text-muted: #475569;
            --blob-primary: #BAE6FD; --blob-secondary: #E9D5FF; --blob-tertiary: #BFDBFE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-base); color: var(--text-main); font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* Accessibility Focus */
        *:focus-visible { outline: 3px solid var(--c-cyan); outline-offset: 4px; border-radius: 8px; }

        /* Ambient Lighting */
        .ambient-lighting { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .aurora-blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.35; animation: floatEngine 24s infinite alternate ease-in-out; }
        .blob-1 { top: 10%; left: 10%; width: 40vw; height: 40vw; background: var(--blob-primary); }
        .blob-2 { bottom: 10%; right: 10%; width: 50vw; height: 50vw; background: var(--blob-secondary); animation-delay: -5s; }
        
        @keyframes floatEngine { 0% { transform: translate3d(0,0,0) scale(1); } 100% { transform: translate3d(5%, 10%, 0) scale(1.05); } }

        /* Glass Card */
        .error-card {
            background: var(--glass-surface); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border);
            padding: 50px 40px; border-radius: 32px; text-align: center; max-width: 500px; width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp { 0% { transform: translateY(30px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        .error-code {
            font-size: clamp(5rem, 15vw, 8rem); font-weight: 800; line-height: 1; margin-bottom: 10px;
            background: linear-gradient(135deg, var(--c-cyan), var(--c-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(6, 182, 212, 0.2));
        }

        .error-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 15px; }
        .error-desc { color: var(--text-muted); font-size: 1rem; line-height: 1.6; margin-bottom: 35px; }

        /* Buttons Container */
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }

        /* Premium Button */
        .btn-action {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            color: #fff; padding: 15px 30px; border-radius: 16px; text-decoration: none;
            font-weight: 600; border: 1px solid rgba(255,255,255,0.15); flex: 1; min-width: 160px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s, filter 0.2s;
            position: relative; overflow: hidden;
        }
        .btn-action.bg-blue { background: linear-gradient(135deg, var(--c-blue), #1d4ed8); }
        .btn-action.bg-slate { background: linear-gradient(135deg, #475569, #1e293b); }
        
        .btn-action:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .btn-action:active { transform: scale(0.96); }
        
        .ripple { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-anim 0.6s linear; background: rgba(255,255,255,0.4); pointer-events: none; }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        /* A11y Prefers Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, .aurora-blob, .error-card { animation: none !important; transition: none !important; transform: none !important; }
        }
    </style>
</head>
<body>

    <div class="ambient-lighting" aria-hidden="true">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
    </div>

    <main class="error-card" role="main">
        <div class="error-code" aria-label="Error 404">404</div>
        <h1 class="error-title">পৃষ্ঠাটি খুঁজে পাওয়া যায়নি</h1>
        <p class="error-desc">আপনি যে পেজটি খুঁজছেন তা হয়তো সরানো হয়েছে অথবা লিংকটি ভুল। অনুগ্রহ করে হোম পেজে ফিরে যান।</p>
        
        <div class="btn-group">
            <a href="javascript:history.back()" class="btn-action bg-slate" aria-label="Go back to the previous page">
                <span class="material-icons-round" aria-hidden="true">arrow_back</span>
                Go Back
            </a>
            <a href="index.html" class="btn-action bg-blue" aria-label="Return to the homepage">
                <span class="material-icons-round" aria-hidden="true">home</span>
                Back to Home
            </a>
        </div>
    </main>

    <script>
        const savedTheme = localStorage.getItem('assra_theme') || 'auto';
        document.documentElement.setAttribute('data-theme', savedTheme);
        if(savedTheme === 'light') {
            document.getElementById('meta-theme-color').setAttribute("content", "#f8fafc");
        }

        document.querySelectorAll('.btn-action').forEach(btn => {
            btn.addEventListener('click', function(e) {
                let box = this.getBoundingClientRect();
                let ripple = document.createElement('span');
                ripple.className = 'ripple';
                ripple.style.left = `${e.clientX - box.left}px`;
                ripple.style.top = `${e.clientY - box.top}px`;
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
</body>
</html>
