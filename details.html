<!DOCTYPE html>  
<html lang="bn" data-theme="auto">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">  
    <meta http-equiv="X-UA-Compatible" content="ie=edge">  
    <meta name="theme-color" content="#0f172a" id="meta-theme-color">

    <!-- 🌐 Enterprise SEO & Meta Tags -->
    <title>নোটিশ বিস্তারিত | ASSRA Official Portal</title>  
    <meta name="description" content="আরামবাগ সাবডিভিশনাল স্পোর্টস এন্ড রেফারি অ্যাসোসিয়েশনের (ASSRA) অফিসিয়াল নোটিশ এবং আপডেট বিস্তারিত পড়ুন।">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="নোটিশ বিস্তারিত | ASSRA Official Portal">
    <meta property="og:description" content="আরামবাগ সাবডিভিশনাল স্পোর্টস এন্ড রেফারি অ্যাসোসিয়েশনের অফিসিয়াল নোটিশ।">
    
    <!-- Resource Hints for High Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    
    <!-- Stable Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">  
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" media="print" onload="this.media='all'">  

    <style>  
        /* =========================================================
           🏗️ ENTERPRISE CSS ARCHITECTURE
           ========================================================= */
        :root {
            --bg-base: #0f172a; --glass-surface: rgba(30, 41, 59, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --blob-primary: #38bdf8; --blob-secondary: #8b5cf6; --blob-tertiary: #10b981;
            --c-blue: #3b82f6; --c-cyan: #06b6d4; --c-purple: #8b5cf6; --c-rose: #f43f5e;
            --cinematic-easing: cubic-bezier(0.2, 0.8, 0.2, 1);
            --shadow-elevation: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            --bg-base: #f8fafc; --glass-surface: rgba(255, 255, 255, 0.85); --glass-border: rgba(148, 163, 184, 0.2);
            --text-main: #0f172a; --text-muted: #475569; --shadow-elevation: 0 20px 40px rgba(148, 163, 184, 0.15);
            --blob-primary: #BAE6FD; --blob-secondary: #E9D5FF; --blob-tertiary: #BFDBFE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
            background-color: var(--bg-base); color: var(--text-main);
            min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
            display: flex; flex-direction: column; transition: background-color 0.5s var(--cinematic-easing), color 0.5s ease;
        }

        /* Accessibility Focus & Skip Link */
        *:focus-visible { outline: 3px solid var(--c-cyan); outline-offset: 4px; border-radius: 8px; }
        .skip-link { position: absolute; top: -50px; left: 0; background: var(--c-blue); color: #fff; padding: 10px 20px; z-index: 100000; font-weight: 700; text-decoration: none; border-radius: 0 0 10px 0; transition: top 0.2s ease; }
        .skip-link:focus { top: 0; }

        /* 🌊 Ambient Lighting Background */
        .ambient-lighting { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .aurora-blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.35; animation: floatEngine 24s infinite alternate ease-in-out; transform: translateZ(0); }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--blob-primary); }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: var(--blob-secondary); animation-delay: -4s; }
        @media (max-width: 768px) { .aurora-blob { filter: blur(80px); } }
        @keyframes floatEngine { 0% { transform: translate3d(0,0,0) scale(1); } 100% { transform: translate3d(5%, 10%, 0) scale(1.05); } }

        /* Top Bar */
        .top-bar {
            background: var(--glass-surface); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            padding: 10px 24px; display: flex; justify-content: space-between; align-items: center; gap: 15px;
            border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100;
        }
        
        .btn-back {
            display: inline-flex; align-items: center; gap: 8px; background: rgba(148, 163, 184, 0.1);
            color: var(--text-main); border: 1px solid var(--glass-border); padding: 8px 16px;
            border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 0.95rem;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s;
            position: relative; overflow: hidden;
        }
        .btn-back:hover { background: rgba(148, 163, 184, 0.2); transform: translateX(-3px); }
        .btn-back:active { transform: scale(0.96); }

        /* Main Container & Notice Card */
        .main-container {
            max-width: 900px; margin: 40px auto; padding: 0 20px; flex-grow: 1; width: 100%;
            animation: slideUp 0.6s var(--cinematic-easing) forwards; opacity: 0; transform: translateY(30px);
        }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .notice-card {
            background: var(--glass-surface); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-radius: 24px; padding: clamp(30px, 5vw, 50px) clamp(20px, 4vw, 40px);
            border: 1px solid var(--glass-border); box-shadow: var(--shadow-elevation);
        }

        .notice-header { border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; margin-bottom: 25px; }
        .notice-title { font-size: clamp(1.5rem, 3vw, 2rem); font-weight: 800; color: var(--c-cyan); margin-bottom: 12px; line-height: 1.4; }
        .notice-date { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 100px; border: 1px solid var(--glass-border); font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
        .notice-body { font-size: clamp(1rem, 1.5vw, 1.1rem); line-height: 1.8; color: var(--text-main); white-space: pre-wrap; }

        /* Enterprise Skeleton Loader */
        .skeleton { background: linear-gradient(90deg, rgba(148,163,184,0.1) 25%, rgba(148,163,184,0.2) 50%, rgba(148,163,184,0.1) 75%); background-size: 200% 100%; animation: skeletonShimmer 1.5s infinite linear; border-radius: 8px; }
        .sk-title { height: 40px; width: 80%; margin-bottom: 15px; }
        .sk-date { height: 25px; width: 150px; border-radius: 100px; margin-bottom: 25px; }
        .sk-line { height: 16px; margin-bottom: 12px; width: 100%; }
        .sk-line.short { width: 60%; }
        @keyframes skeletonShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Ripple Effect */
        .ripple { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-anim 0.6s linear; background: rgba(255,255,255,0.4); pointer-events: none; }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        /* A11y & Performance */
        @media (prefers-reduced-motion: reduce) { *, .aurora-blob, .main-container { animation: none !important; transition: none !important; transform: none !important; } .main-container { opacity: 1; } }

        /* GTranslate */
        .goog-te-gadget { color: transparent !important; font-size: 0px !important; }
        .goog-te-gadget .goog-te-combo { margin: 0; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-base); color: var(--text-main); font-family: inherit; font-size: 14px; outline: none; cursor: pointer; font-weight: 600; }
        .goog-logo-link, .goog-te-gadget > span, .skiptranslate iframe { display: none !important; }
        body { top: 0 !important; }

        /* Footer */
        footer { text-align: center; padding: 30px; color: var(--text-muted); font-size: 0.9rem; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.1); backdrop-filter: blur(10px); margin-top: auto; }
    </style>
</head>  
<body>  

    <!-- A11y Skip Link -->
    <a href="#notice-container" class="skip-link">Skip to content</a>

    <!-- Ambient Lighting Background -->
    <div class="ambient-lighting" aria-hidden="true">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
    </div>

    <!-- Top Navigation Bar -->
    <header class="top-bar" role="banner">  
        <a href="index.html" class="btn-back btn-action" aria-label="হোম পেজে ফিরে যান">
            <span class="material-icons-round" aria-hidden="true" style="font-size: 18px;">arrow_back</span> হোম পেজ
        </a>
        <div class="gtranslate_wrapper"></div>
    </header>  

    <!-- Main Notice Content -->
    <main class="main-container" role="main">
        <article class="notice-card" id="notice-container" aria-live="polite" aria-busy="true">
            
            <!-- Loading Skeleton State -->
            <div id="loading-state" aria-hidden="true">
                <div class="skeleton sk-title"></div>
                <div class="skeleton sk-date"></div>
                <div style="margin-top: 30px;">
                    <div class="skeleton sk-line"></div>
                    <div class="skeleton sk-line"></div>
                    <div class="skeleton sk-line"></div>
                    <div class="skeleton sk-line short"></div>
                </div>
            </div>

            <!-- Notice Content State (Hidden Initially) -->
            <div id="content-state" style="display: none;">
                <header class="notice-header">
                    <h1 class="notice-title" id="notice-title"></h1>
                    <div class="notice-date">
                        <span class="material-icons-round" aria-hidden="true" style="font-size: 16px;">calendar_today</span>
                        <span id="notice-date"></span>
                    </div>
                </header>
                <div class="notice-body" id="notice-body"></div>
            </div>

            <!-- Error State (Hidden Initially) -->
            <div id="error-state" style="display: none; text-align: center; padding: 30px 0;">
                <span class="material-icons-round" aria-hidden="true" style="font-size: 48px; color: var(--c-rose); margin-bottom: 15px;">error_outline</span>
                <h2 style="color: var(--text-main); margin-bottom: 10px;">নোটিশ পাওয়া যায়নি</h2>
                <p style="color: var(--text-muted);">আপনি যে নোটিশটি খুঁজছেন তা হয়তো মুছে ফেলা হয়েছে অথবা লিংকটি ভুল।</p>
                <a href="index.html" class="btn-back btn-action" style="margin-top: 20px; display: inline-flex;">হোম পেজে ফিরে যান</a>
            </div>
        </article>
    </main>

    <!-- Unified Branding Footer -->
    <footer role="contentinfo">
        ASSRA Official Portal • 🆕 🚧 ⚠️ Beta Version 12 Premium Upgrade
    </footer>

    <!-- Core Scripts -->
    <script>
        // System Theme Handler Initialization
        const savedTheme = localStorage.getItem('assra_theme') || 'auto';
        if(savedTheme !== 'auto') {
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('meta-theme-color').setAttribute("content", savedTheme === 'light' ? '#f8fafc' : '#0f172a');
        }

        // Advanced Web Ripple Effect for Buttons
        document.querySelectorAll('.btn-action').forEach(btn => {
            btn.addEventListener('click', function(e) {
                let box = this.getBoundingClientRect();
                let ripple = document.createElement('span');
                ripple.className = 'ripple';
                ripple.style.left = `${e.clientX - box.left}px`;
                ripple.style.top = `${e.clientY - box.top}px`;
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Cloud API Fetch Logic for Notice Details
        const urlParams = new URLSearchParams(window.location.search);
        const noticeId = urlParams.get('id');
        const container = document.getElementById('notice-container');

        if (noticeId !== null) {
            fetch("https://script.google.com/macros/s/AKfycbzhG400jaJkrrfRcObaLD0qYjCIQEfuEOa362OD9GGldOhF5ts9cF0c4txvgV2XcFDXtA/exec")
            .then(response => {
                if(!response.ok) throw new Error("Network response was not ok");
                return response.json();
            })
            .then(data => {
                const notice = data[noticeId];
                if (notice) {
                    // Title Parser
                    const titleText = notice.Title || notice.title || notice.notice_title || "অফিসিয়াল বিজ্ঞপ্তি";
                    document.getElementById('notice-title').innerText = titleText;
                    document.title = `${titleText} | ASSRA Official`; // Update Document Title for SEO
                    
                    // Date Formatter
                    let dateStr = notice.Date || notice.date || notice.Timestamp || "সাম্প্রতিক";
                    if(dateStr && typeof dateStr === 'string' && dateStr.includes('T')) {
                        const dateObj = new Date(dateStr);
                        dateStr = dateObj.toLocaleDateString('bn-BD', { day: 'numeric', month: 'long', year: 'numeric' });
                    }
                    document.getElementById('notice-date').innerText = dateStr;
                    
                    // Content Body Parser
                    document.getElementById('notice-body').innerHTML = notice.Details || notice.details || notice.notice_details || "এই নোটিশটির কোনো বিস্তারিত বিবরণ উপলব্ধ নেই।";
                    
                    // UI State Switch
                    document.getElementById('loading-state').style.display = 'none';
                    document.getElementById('content-state').style.display = 'block';
                    container.removeAttribute('aria-busy'); // Accessibility Update
                } else {
                    showError();
                }
            })
            .catch(error => {
                console.error("Notice Fetch Error:", error);
                showError();
            });
        } else {
            showError();
        }

        function showError() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
            container.removeAttribute('aria-busy');
            document.title = "404 নোটিশ পাওয়া যায়নি | ASSRA Official";
        }
    </script>

    <!-- GTranslate Enterprise Config -->
    <script>
        window.gtranslateSettings = {
            "default_language": "bn", "languages": ["bn", "en", "hi"],
            "wrapper_selector": ".gtranslate_wrapper", "flag_style": "3d", "alt_flags": {"en": "usa"}
        }
    </script>
    <script src="https://cdn.gtranslate.net/widgets/latest/dropdown.js" defer></script>
</body>  
</html>
